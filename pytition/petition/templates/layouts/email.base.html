{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="{{ LANGUAGE_CODE}}">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="author" content="Pytition">
  <title>{{ settings.SITE_NAME }} - {% block title %}{% endblock title %}</title>
  <style>
    /* Generic */
  #nl {
    background: #e2e8f0;
    color: #1f1f1f;
    font-family: Roboto, sans-serif;
    margin: 0;
  }

  #nl h1,
  #nl h2,
  #nl h3 {
    color: #487982;
    margin-bottom: .5em;
  }

  #nl h1 {
    font-size: 150%;
    margin-top: 1.8em;
  }

  #nl h2 {
    color: #55919e;
    font-size: 24px;
    margin-top: 1.4em;
  }

  #nl h3 {
    font-size: 105%;
    margin-top: 1.1em;
  }

  #nl p,
  #nl ul {
    line-height: 1.5;
    margin-top: 0;
    margin-bottom: 1em;
    font-size: 1rem;
  }

  #nl blockquote {
    background: #f7fafc;
    border-left: 6px solid #fc8e3a;
    padding: 1.25rem 1.5rem;
  }

  #nl code {
    background: #fcf7f7;
    color: #c42719;
    white-space: pre;
  }

  #nl a {
    border-bottom: 2px solid #a0aec0;
    color: #1f1f1f;
    text-decoration: none;
  }

  #nl a:hover,
  #nl a:focus {
    border-color: #fc8e3a;
    color: #1a202c;
  }

  #nl .violet { color: #725794; }
  #nl .orange { color: #cc4e13; }

  #nl .btn-soutenir {
    background: #cc4e13;
    border-color: #cc4e13;
    border-radius: 4px;
    color: #fff !important;
    cursor: pointer;
    display: inline-block;
    font-weight: bold;
    padding: .5em 1em;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    white-space: nowrap;
  }

  #nl .btn-soutenir:hover {
    background: #a94110;
    border-color: #a94110;
    color: #fff;
  }

  /* Layout */
  #nl .container {
    margin: 10px auto 20px;
    max-width: 970px;
    padding: 20px 30px;
  }

  #nl .ombre {
    background-color: #fff;
    -webkit-box-shadow: 0px 3px 4px rgba(50, 50, 50, 0.2);
    -moz-box-shadow: 0px 3px 4px rgba(50, 50, 50, 0.2);
    box-shadow: 0px 3px 4px rgba(50, 50, 50, 0.2);
  }

  #nl .article {
    margin: 0 auto 30px;
    max-width: 800px;
  }

  @media (min-width: 768px) {
    #nl .container {
      width: 750px;
    }
  }

  @media (min-width: 992px) {
    #nl .container {
      width: 970px;
    }
  }

  @media (max-width: 768px) {
    #nl .container {
      margin: 0 auto;
    }
  }

  /* Header (old nl) */
  #nl-header {
    color: #4a5568;
    font-weight: bold;
  }

  #nl-header .logo {
    text-align: center;
  }

  #nl-header img {
    height: auto;
    max-width: 80px;
  }

  #nl-header .title {
    text-align: center;
    margin-bottom: 15px;
  }

  #nl-header .title > * {
    margin: 0 0 10px 0;
  }

  #nl-header h1 {
    font-size:48px;
  }

  #nl-header h2 {
    font-size: 26px;
  }

  /* Table of Content */
  #nl #toc {
    background: #fff9f0;
    margin: 2em 0;
    padding: 10px 20px 10px 0;
    width: 66%;
  }

  #nl #toc > ul {
    list-style: none;
  }

  #nl #toc > ul > li {
    margin-bottom: .5em;
  }

  #nl #toc > ul ul {
    list-style-type: disc;
    margin-bottom: 0;
  }

  @media (max-width: 768px) {
    #nl #toc {
      width: auto;
    }
  }

  #nl #toc h2 {
    color: #1f1f1f;
    font-size: 16px;
    margin: .5em 0 .5em;
    text-align: center;
  }

  #nl #toc a {
    border: none;
  }

  #nl #toc a:hover {
    text-decoration: underline;
  }

  /* Footer */
  #nl-footer img {
    box-sizing: content-box;
  }
  </style>
</head>
